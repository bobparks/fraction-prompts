<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設計提示詞 ✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1f45;
    padding: 24px;
  }

  .card-container {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  h1 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 700;
    color: #d4a843;
  }

  .copy-card {
    background: #1b2d5b;
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    gap: 16px;
    border: 1px solid rgba(212,168,67,0.2);
  }

  .label {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #d4a843;
  }

  .prompt-text {
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.6;
    color: #e8eaf0;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .copy-btn {
    align-self: stretch;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    background: #d4a843;
    color: #0f1f45;
    box-shadow: 0 4px 14px rgba(212,168,67,0.35);
  }

  .copy-btn:active {
    transform: scale(0.97);
  }

  .copy-btn.copied {
    background: #a8d5a2 !important;
    color: #0f1f45 !important;
    box-shadow: 0 4px 14px rgba(168,213,162,0.3) !important;
  }

  .link-btn {
    display: block;
    text-align: center;
    padding: 16px;
    border-radius: 14px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-decoration: none;
    color: #0f1f45;
    background: #e8eaf0;
    box-shadow: 0 4px 14px rgba(255,255,255,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .link-btn:active {
    transform: scale(0.97);
  }

  .instructions {
    text-align: center;
    font-size: 0.95rem;
    font-weight: 500;
    color: rgba(232,234,240,0.6);
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card-container">
  <h1>✏️ 數學題提示詞</h1>

  <!-- Step 1: Copy the Prompt -->
  <div class="copy-card">
    <span class="label">步驟 1 — 選擇並複製</span>
    <div class="prompt-text" id="promptText">請生成一道兩個帶分數相加的練習題</div>
    <button class="copy-btn" id="promptBtn" onclick="copyText()">
      📋 &nbsp;複製提示詞
    </button>
  </div>

  <!-- Step 2: Open the Chatbot -->
  <div class="copy-card">
    <span class="label">第二步 - 開啟聊天機器人</span>
    <a class="link-btn" href="https://chat.uat.jcgoai.hk" target="_blank">
      🚀 &nbsp;開啟聊天機器人
    </a>
  </div>

  <p class="instructions">
    開啟聊天機器人，<br>
然後把提示詞貼上聊天視窗，可使用任何人工智能模型。 🚀
  </p>
</div>

<script>
function copyText() {
  const text = document.getElementById('promptText').textContent;
  const btn = document.getElementById('promptBtn');

  navigator.clipboard.writeText(text).then(() => {
    showCopied(btn);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  });
}

function showCopied(btn) {
  const original = btn.innerHTML;
  btn.innerHTML = '✅ &nbsp;複製成功！';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.innerHTML = original;
    btn.classList.remove('copied');
  }, 2000);
}
</script>

</body>
</html>
