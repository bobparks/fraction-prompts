
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fraction Catch</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #e0f4ff; font-family: sans-serif; user-select: none; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    basket.y = canvas.height - 80;
  }

  let score = 0;
  let catchesCount = 0;
  const denoms = [2, 3, 4, 5, 6, 8, 10, 12];
  const colors = ['#e67e22', '#9b59b6', '#3498db', '#e74c3c'];

  const targets = [
    { text: "LARGER than 1/2", check: (n, d) => (n / d) > 0.5 },
    { text: "LESS than 1/2", check: (n, d) => (n / d) < 0.5 },
    { text: "EQUAL to 1/2", check: (n, d) => Math.abs((n / d) - 0.5) < 0.001 },
    { text: "EQUAL to 3/4", check: (n, d) => Math.abs((n / d) - 0.75) < 0.001 },
    { text: "EQUAL to 1/3", check: (n, d) => Math.abs((n / d) - (1/3)) < 0.001 }
  ];
  let currentTarget = targets[0];

  function changeTarget() {
    const original = currentTarget;
    while (currentTarget === original) {
      currentTarget = targets[Math.floor(Math.random() * targets.length)];
    }
  }

  const basket = { x: 0, y: 0, w: 110, h: 20 };
  let items = [];

  function createItem() {
    const d = denoms[Math.floor(Math.random() * denoms.length)];
    const n = Math.floor(Math.random() * d) + 1;
    return {
      x: Math.random() * (canvas.width - 70) + 35,
      y: -40,
      r: 32,
      n: n,
      d: d,
      speed: Math.random() * 2 + 3,
      color: colors[Math.floor(Math.random() * colors.length)]
    };
  }

  function handleTouch(e) {
    if (e.touches.length > 0) {
      basket.x = e.touches[0].clientX - basket.w / 2;
      if (basket.x < 0) basket.x = 0;
      if (basket.x > canvas.width - basket.w) basket.x = canvas.width - basket.w;
    }
  }
  canvas.addEventListener('touchstart', handleTouch, { passive: true });
  canvas.addEventListener('touchmove', handleTouch, { passive: true });

  let flashColor = null;
  let flashTimer = 0;

  function triggerFlash(color) {
    flashColor = color;
    flashTimer = 8;
  }

  let lastTime = performance.now();
  const fpsInterval = 1000 / 30;

  function update() {
    if (items.length < 3 && Math.random() < 0.02) {
      items.push(createItem());
    }

    for (let i = items.length - 1; i >= 0; i--) {
      const item = items[i];
      item.y += item.speed;

      const hitX = (item.x >= basket.x && item.x <= basket.x + basket.w);
      const hitY = (item.y + item.r >= basket.y && item.y - item.r <= basket.y + basket.h);

      if (hitX && hitY) {
        if (currentTarget.check(item.n, item.d)) {
          score++;
          triggerFlash('#2ecc71');
        } else {
          score--;
          triggerFlash('#e74c3c');
        }
        catchesCount++;
        if (catchesCount % 5 === 0) changeTarget();
        items.splice(i, 1);
        continue;
      }

      if (item.y - item.r > canvas.height) {
        items.splice(i, 1);
      }
    }

    if (flashTimer > 0) {
      flashTimer--;
      if (flashTimer === 0) flashColor = null;
    }
  }

  function draw() {
    ctx.fillStyle = '#e0f4ff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(basket.x, basket.y, basket.w, basket.h);

    items.forEach(item => {
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
      ctx.fillStyle = item.color;
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#ffffff';
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 18px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.n, item.x, item.y - 9);

      ctx.beginPath();
      ctx.moveTo(item.x - 12, item.y);
      ctx.lineTo(item.x + 12, item.y);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillText(item.d, item.x, item.y + 11);
    });

    ctx.textAlign = 'center';
    ctx.fillStyle = '#2c3e50';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText("Catch fractions " + currentTarget.text, canvas.width / 2, 65);

    ctx.fillStyle = flashColor ? flashColor : '#2c3e50';
    ctx.font = 'bold 32px sans-serif';
    ctx.fillText("Score: " + score, canvas.width / 2, 115);
  }

  function gameLoop(time) {
    requestAnimationFrame(gameLoop);
    const elapsed = time - lastTime;
    if (elapsed > fpsInterval) {
      lastTime = time - (elapsed % fpsInterval);
      update();
      draw();
    }
  }

  window.addEventListener('resize', resize);
  resize();
  basket.x = canvas.width / 2 - basket.w / 2;
  requestAnimationFrame(gameLoop);
</script>
</body>
</html>
